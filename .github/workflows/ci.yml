name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/android-build-setup

      - run: chmod +x gradlew

      - name: Validate release semver script
        run: chmod +x .github/scripts/test-next-semver.sh && .github/scripts/test-next-semver.sh

      - name: Unit tests and assemble debug APK
        run: ./gradlew :core:api:testDebugUnitTest :app:assembleDebug --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk

  live-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/android-build-setup
      - run: chmod +x gradlew .github/scripts/run-live-api-tests.sh .github/scripts/summarize-live-api-tests.sh
      - name: Live bahn.de integration (Hamburg→Berlin, JVM)
        run: .github/scripts/run-live-api-tests.sh --stacktrace
      - name: Summarize live API results
        if: always()
        run: .github/scripts/summarize-live-api-tests.sh

  e2e:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/android-build-setup

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: google_apis
          disable-animations: true
          script: |
            chmod +x gradlew
            ./gradlew :app:connectedDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.clearPackageData=true -Pandroid.testInstrumentationRunnerArguments.notClass=de.openbahn.navigator.SearchLiveE2ETest --stacktrace
