name: CI

on:
  push:
    branches: [main, 'cursor/**']
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - run: echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties
      - run: chmod +x gradlew
      - name: Run unit tests
        run: ./gradlew :core:api:testDebugUnitTest --stacktrace

  integration-api:
    runs-on: ubuntu-latest
    env:
      RUN_LIVE_API_TESTS: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - run: echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties
      - run: chmod +x gradlew
      - name: Run live bahn.de API tests (host JVM, no emulator)
        run: ./gradlew :core:api:testDebugUnitTest --tests "de.openbahn.api.DbVendoLiveApiTest" --stacktrace

  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - run: echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties
      - run: chmod +x gradlew
      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: google_apis
          disable-animations: true
          script: |
            echo "sdk.dir=$ANDROID_HOME" >> local.properties
            chmod +x gradlew
            ./gradlew :app:connectedDebugAndroidTest \
              -Pandroid.testInstrumentationRunnerArguments.clearPackageData=true \
              --stacktrace
