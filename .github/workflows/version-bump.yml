name: Version Bump (manual)

# Optional: force a major/minor/patch release outside conventional commits.
# Normal releases happen automatically on push to main (see release.yml).

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Force version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  force-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Force bump version
        id: ver
        run: |
          current=$(grep versionCode version.properties | cut -d= -f2)
          name=$(grep versionName version.properties | cut -d= -f2)
          IFS=. read -r major minor patch <<< "$name"
          case "${{ github.event.inputs.bump }}" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch) patch=$((patch+1)) ;;
          esac
          new_name="$major.$minor.$patch"
          new_code=$((current+1))
          printf 'versionName=%s\nversionCode=%s\n' "$new_name" "$new_code" > version.properties
          echo "tag=v$new_name" >> $GITHUB_OUTPUT

      - name: Commit, tag, and push
        run: |
          git add version.properties
          git commit -m "chore: release ${{ steps.ver.outputs.tag }} (manual) [skip ci]"
          git push origin main
          git tag "${{ steps.ver.outputs.tag }}"
          git push origin "${{ steps.ver.outputs.tag }}"

      # Release workflow is skipped via [skip ci]; build release here
      - uses: ./.github/actions/android-build-setup
      - run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: OpenBahn Navigator ${{ steps.ver.outputs.tag }}
          files: app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
