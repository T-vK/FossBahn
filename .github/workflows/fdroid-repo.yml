name: F-Droid repo (manual)

# Publish or refresh the GitHub Pages F-Droid repo without cutting a new release.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: fdroid-pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/android-build-setup

      - name: Cache F-Droid repo signing key
        uses: actions/cache@v4
        with:
          path: fdroid/keystore.p12
          key: fdroid-repo-keystore-${{ github.repository }}

      - name: Build F-Droid repo and Pages site
        env:
          CI: true
        run: |
          chmod +x .github/scripts/update-fdroid-repo.sh
          .github/scripts/update-fdroid-repo.sh

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: fdroid-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
