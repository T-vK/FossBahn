name: F-Droid repo (manual)

# Refresh the GitHub Pages F-Droid repo without cutting a new semver release.
# Normal updates run automatically in the Release workflow (deploy-fdroid-pages job).
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: fdroid-pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: ./.github/actions/android-build-setup

      - uses: ./.github/actions/publish-fdroid-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
