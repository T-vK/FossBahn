name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force:
        description: 'Force a patch release if semver finds no conventional commits'
        required: false
        default: false
        type: boolean

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    # Run on manual dispatch, or on push except version-bump bot commits (those use [skip ci]).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'push' &&
        !contains(github.event.head_commit.message, '[skip ci]') &&
        !startsWith(github.event.head_commit.message, 'chore: release v')
      )
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.semver.outputs.skip == 'false' }}
      skip: ${{ steps.semver.outputs.skip }}
      version: ${{ steps.semver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/android-build-setup

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute next semantic version
        id: semver
        env:
          FORCE_BUMP: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force == 'true' }}
        run: |
          chmod +x .github/scripts/next-semver.sh .github/scripts/test-next-semver.sh
          .github/scripts/test-next-semver.sh
          echo "Commits since last tag:"
          LAST=$(git describe --tags --match 'v*' --abbrev=0 2>/dev/null || echo "(none)")
          if [ "$LAST" != "(none)" ]; then
            git log "${LAST}..HEAD" --oneline --no-merges || true
          fi
          eval "$(.github/scripts/next-semver.sh)"
          echo "Computed: bump=$bump version=$version"
          echo "bump=$bump" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if [ "$bump" = "none" ]; then
            echo "No releasable commits (use feat:/fix:/BREAKING or run workflow with force=true). Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update version.properties
        if: steps.semver.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.semver.outputs.version }}"
          VERSION="${VERSION#v}"
          CODE=$(echo "$VERSION" | awk -F. '{printf "%d", $1*10000+$2*100+$3}')
          printf 'versionName=%s\nversionCode=%s\n' "$VERSION" "$CODE" > version.properties
          cat version.properties

      - name: Commit version bump
        if: steps.semver.outputs.skip == 'false'
        run: |
          git add version.properties
          git commit -m "chore: release ${{ steps.semver.outputs.version }} [skip ci]"
          git push origin main

      - name: Create and push tag
        if: steps.semver.outputs.skip == 'false'
        run: |
          git tag "${{ steps.semver.outputs.version }}"
          git push origin "${{ steps.semver.outputs.version }}"

      - name: Build debug APK (GitHub Release + F-Droid repo)
        if: steps.semver.outputs.skip == 'false'
        id: build
        env:
          CI: true
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace
          APK="$(ls -1 app/build/outputs/apk/debug/OpenBahnNavigator-*-debug.apk | head -1)"
          echo "apk=$APK" >> "$GITHUB_OUTPUT"
          ls -la app/build/outputs/apk/debug/

      - name: Publish GitHub Release
        if: steps.semver.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.semver.outputs.version }}
          name: OpenBahn Navigator ${{ steps.semver.outputs.version }}
          files: app/build/outputs/apk/debug/OpenBahnNavigator-*.apk
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.semver.outputs.version, '-') }}
          body: |
            ## OpenBahn Navigator ${{ steps.semver.outputs.version }}

            Automatic release from `main` (semantic versioning).

            **Version bump:** `${{ steps.semver.outputs.bump }}` (from conventional commits since the previous tag)

            Install the attached **`OpenBahnNavigator-v…-….apk`** (debug build, CI-signed for in-place upgrades).

            **F-Droid custom repo:** [Add repository](https://t-vk.github.io/FossBahn/fdroid/) — URL `https://t-vk.github.io/FossBahn/fdroid/repo` (same debug APK, package `de.openbahn.navigator.debug`). Updated automatically on GitHub Pages after this release.

            **One-time:** If you installed an older release built before stable CI signing, uninstall once, then install this APK. Later releases upgrade without uninstalling as long as `versionCode` increases.

      - name: Configure F-Droid repository signing
        if: steps.semver.outputs.skip == 'false'
        run: |
          chmod +x .github/scripts/prepare-fdroid-signing.sh
          .github/scripts/prepare-fdroid-signing.sh

      - name: Update F-Droid repo index
        if: steps.semver.outputs.skip == 'false'
        run: |
          chmod +x .github/scripts/update-fdroid-repo.sh
          .github/scripts/update-fdroid-repo.sh --apk "${{ steps.build.outputs.apk }}"

      - name: Upload GitHub Pages artifact
        if: steps.semver.outputs.skip == 'false'
        uses: actions/upload-pages-artifact@v3
        with:
          path: fdroid-pages

  # Deploys fdroid-pages artifact from the release job (GitHub Pages → Source: GitHub Actions).
  deploy-fdroid-pages:
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
