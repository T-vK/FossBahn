name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force:
        description: 'Force a patch release if semver finds no conventional commits'
        required: false
        default: false
        type: boolean

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    # Run on manual dispatch, or on push except version-bump bot commits (those use [skip ci]).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'push' &&
        !contains(github.event.head_commit.message, '[skip ci]') &&
        !startsWith(github.event.head_commit.message, 'chore: release v')
      )
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.semver.outputs.skip == 'false' }}
      skip: ${{ steps.semver.outputs.skip }}
      version: ${{ steps.semver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/android-build-setup

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute next semantic version
        id: semver
        env:
          FORCE_BUMP: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force == 'true' }}
        run: |
          chmod +x .github/scripts/next-semver.sh .github/scripts/test-next-semver.sh
          .github/scripts/test-next-semver.sh
          echo "Commits since last tag:"
          LAST=$(git describe --tags --match 'v*' --abbrev=0 2>/dev/null || echo "(none)")
          if [ "$LAST" != "(none)" ]; then
            git log "${LAST}..HEAD" --oneline --no-merges || true
          fi
          if [ "$LAST" != "(none)" ]; then
            echo "prev_tag=$LAST" >> "$GITHUB_OUTPUT"
          else
            echo "prev_tag=v0.0.0" >> "$GITHUB_OUTPUT"
          fi
          eval "$(.github/scripts/next-semver.sh)"
          echo "Computed: bump=$bump version=$version"
          echo "bump=$bump" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if [ "$bump" = "none" ]; then
            echo "No releasable commits (use feat:/fix:/BREAKING or run workflow with force=true). Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update version.properties
        if: steps.semver.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.semver.outputs.version }}"
          VERSION="${VERSION#v}"
          CODE=$(echo "$VERSION" | awk -F. '{printf "%d", $1*10000+$2*100+$3}')
          printf 'versionName=%s\nversionCode=%s\n' "$VERSION" "$CODE" > version.properties
          cat version.properties

      - name: Commit version bump
        if: steps.semver.outputs.skip == 'false'
        run: |
          git add version.properties
          git commit -m "chore: release ${{ steps.semver.outputs.version }} [skip ci]"
          git push origin main

      - name: Create and push tag
        if: steps.semver.outputs.skip == 'false'
        run: |
          git tag "${{ steps.semver.outputs.version }}"
          git push origin "${{ steps.semver.outputs.version }}"

      - name: Embed changelog in APK assets
        if: steps.semver.outputs.skip == 'false'
        run: |
          chmod +x .github/scripts/generate-changelog-assets.sh
          .github/scripts/generate-changelog-assets.sh

      - name: Build debug APK (GitHub Release + F-Droid repo)
        if: steps.semver.outputs.skip == 'false'
        id: build
        env:
          CI: true
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace
          APK="$(ls -1 app/build/outputs/apk/debug/OpenBahnNavigator-*-debug.apk | head -1)"
          echo "apk=$APK" >> "$GITHUB_OUTPUT"
          ls -la app/build/outputs/apk/debug/

      - name: Write release changelog
        if: steps.semver.outputs.skip == 'false'
        run: |
          chmod +x .github/scripts/release-changelog.sh .github/scripts/test-release-changelog.sh
          .github/scripts/test-release-changelog.sh
          .github/scripts/release-changelog.sh "${{ steps.semver.outputs.prev_tag }}" "${{ steps.semver.outputs.version }}" release-notes.md
          cat release-notes.md

      - name: Publish GitHub Release
        if: steps.semver.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.semver.outputs.version }}
          name: OpenBahn Navigator ${{ steps.semver.outputs.version }}
          files: app/build/outputs/apk/debug/OpenBahnNavigator-*.apk
          generate_release_notes: false
          draft: false
          prerelease: ${{ contains(steps.semver.outputs.version, '-') }}
          body_path: release-notes.md

      - name: Build F-Droid repo and Pages artifact
        if: steps.semver.outputs.skip == 'false'
        uses: ./.github/actions/publish-fdroid-pages
        with:
          release-apk-path: ${{ steps.build.outputs.apk }}

  # Deploys fdroid-pages artifact from the release job (GitHub Pages → Source: GitHub Actions).
  deploy-fdroid-pages:
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
