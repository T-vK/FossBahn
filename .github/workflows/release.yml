name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - run: echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties
      - run: chmod +x gradlew
      - name: Sync version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CODE=$(echo "$VERSION" | awk -F. '{printf "%d", $1*10000+$2*100+$3}')
          printf 'versionName=%s\nversionCode=%s\n' "$VERSION" "$CODE" > version.properties
          cat version.properties
      - name: Build debug APK (signed, reproducible for CI)
        run: ./gradlew :app:assembleDebug --stacktrace
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          name: OpenBahn Navigator ${{ github.ref_name }}
          body: |
            ## OpenBahn Navigator ${{ github.ref_name }}

            Install the attached `app-debug.apk` (debug-signed for testing).

            For F-Droid builds, use the source tag — release APKs are debug-signed from CI.
