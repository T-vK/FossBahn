name: Android build setup
description: JDK, Gradle dependency/build cache, and Android SDK for CI

inputs:
  java-version:
    description: Java version
    required: false
    default: '17'

runs:
  using: composite
  steps:
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: ${{ inputs.java-version }}

    # Restores ~/.gradle/caches, wrapper dists, and local build cache between CI runs.
    # Public repos use enhanced caching (free); do not also use setup-java cache: gradle.
    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Install cmdline tools (attempt 1)
      id: android_tools_1
      uses: android-actions/setup-android@v4
      with:
        packages: ''
      continue-on-error: true

    - name: Install cmdline tools (attempt 2)
      id: android_tools_2
      if: steps.android_tools_1.outcome == 'failure'
      uses: android-actions/setup-android@v4
      with:
        packages: ''
      continue-on-error: true

    - name: Install cmdline tools (attempt 3)
      id: android_tools_3
      if: steps.android_tools_2.outcome == 'failure'
      uses: android-actions/setup-android@v4
      with:
        packages: ''

    - name: Install Android SDK packages
      shell: bash
      run: |
        if [ "${{ steps.android_tools_1.outcome }}" != "success" ] && \
           [ "${{ steps.android_tools_2.outcome }}" != "success" ] && \
           [ "${{ steps.android_tools_3.outcome }}" != "success" ]; then
          echo "Failed to install Android cmdline tools" >&2
          exit 1
        fi
        chmod +x .github/scripts/install-android-sdk.sh
        .github/scripts/install-android-sdk.sh

    - name: Write local.properties
      shell: bash
      run: echo "sdk.dir=${ANDROID_SDK_ROOT:-$ANDROID_HOME}" >> local.properties
