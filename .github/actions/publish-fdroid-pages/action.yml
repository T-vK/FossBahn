name: Publish F-Droid Pages artifact
description: Index a release APK into fdroid/repo and stage fdroid-pages (no Gradle when apk-path is set)

inputs:
  release-apk-path:
    description: Pre-built release APK from the release job (skips assembleRelease)
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Install fdroid system dependencies
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq rsync

    - name: Restore F-Droid repo state
      uses: actions/cache@v4
      with:
        path: |
          fdroid/repo
          fdroid/archive
        key: fdroid-repo-state-${{ github.repository }}
        restore-keys: |
          fdroid-repo-state-${{ github.repository }}-

    - name: Configure F-Droid repository signing
      shell: bash
      run: |
        chmod +x .github/scripts/prepare-fdroid-signing.sh
        .github/scripts/prepare-fdroid-signing.sh

    - name: Build F-Droid repo and Pages site
      shell: bash
      run: |
        chmod +x .github/scripts/update-fdroid-repo.sh
        APK_PATH="${{ inputs.release-apk-path }}"
        if [ -n "$APK_PATH" ]; then
          .github/scripts/update-fdroid-repo.sh --apk "$APK_PATH"
        else
          CI=true .github/scripts/update-fdroid-repo.sh
        fi

    - name: Verify F-Droid index
      shell: bash
      run: |
        test -f fdroid-pages/fdroid/repo/index-v1.jar || test -f fdroid-pages/fdroid/repo/index-v2.json
        echo "F-Droid index present under fdroid-pages/fdroid/repo/"

    - name: Upload GitHub Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: fdroid-pages
