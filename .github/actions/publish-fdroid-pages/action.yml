name: Publish F-Droid Pages artifact
description: Index the debug APK into fdroid/repo and stage fdroid-pages (no Gradle when apk-path is set)

inputs:
  release-apk-path:
    description: Pre-built debug APK from the release job (skips assembleDebug)
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Install fdroid system dependencies
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq rsync

    - name: Restore F-Droid repo state
      uses: actions/cache@v4
      with:
        path: |
          fdroid/repo
          fdroid/archive
          fdroid-pages/fdroid/archive
        key: fdroid-repo-state-v2-${{ github.repository }}
        restore-keys: |
          fdroid-repo-state-v2-${{ github.repository }}-
          fdroid-repo-state-${{ github.repository }}-

    - name: Configure F-Droid repository signing
      shell: bash
      run: |
        chmod +x .github/scripts/prepare-fdroid-signing.sh
        .github/scripts/prepare-fdroid-signing.sh

    - name: Build F-Droid repo and Pages site
      shell: bash
      run: |
        chmod +x .github/scripts/update-fdroid-repo.sh
        APK_PATH="${{ inputs.release-apk-path }}"
        if [ -n "$APK_PATH" ]; then
          .github/scripts/update-fdroid-repo.sh --apk "$APK_PATH"
        else
          CI=true .github/scripts/update-fdroid-repo.sh
        fi

    - name: Verify F-Droid index
      shell: bash
      run: |
        test -f fdroid-pages/fdroid/repo/index-v1.jar || test -f fdroid-pages/fdroid/repo/index-v2.json
        OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
        EXPECTED="https://${OWNER_LC}.github.io/${GITHUB_REPOSITORY#*/}/fdroid/repo"
        ACTUAL="$(python3 -c "import json; print(json.load(open('fdroid-pages/fdroid/repo/index-v2.json'))['repo']['address'])")"
        if [ "$ACTUAL" != "$EXPECTED" ]; then
          echo "index address mismatch: got $ACTUAL, expected $EXPECTED" >&2
          exit 1
        fi
        echo "F-Droid index OK ($ACTUAL)"
        test -f fdroid-pages/fdroid/repo/icons/icon.png
        echo "F-Droid repo icon present"
        VERSIONS="$(python3 -c "import json; from pathlib import Path; idx=json.loads(Path('fdroid-pages/fdroid/repo/index-v2.json').read_text()); print(sum(len(p.get('versions', {})) for p in idx.get('packages', {}).values()))")"
        ON_DISK="$(find fdroid/repo fdroid/archive -maxdepth 1 -name '*.apk' 2>/dev/null | wc -l)"
        echo "Indexed versions: $VERSIONS (APKs on disk: $ON_DISK)"
        if [ "$ON_DISK" -ge 2 ] && [ "$VERSIONS" -lt 2 ]; then
          echo "APKs on disk but index lists fewer than 2 versions" >&2
          exit 1
        fi

    - name: Upload GitHub Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: fdroid-pages
